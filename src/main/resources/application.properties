# Service Port (Profile is 8081, Auth is 8080, Gateway is 8086)
server.port=8082

# Application Name
spring.application.name=stall-service

# MySQL Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/stall_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
# 'update' automatically creates/updates database tables based on your Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true